<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner (Auto Save)</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0">

  <!-- QR Library -->
  <script src="https://unpkg.com/html5-qrcode" defer></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    #reader {
      width: 320px;
      margin: 40px auto;
      border: 2px solid #0f0;
      border-radius: 10px;
    }
    #status {
      margin-top: 20px;
      font-size: 1.2em;
      color: #0f0;
    }
    .install-btn {
      margin-top: 15px;
      background: #0f0;
      color: #000;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Auto QR Scanner</h1>
  <div id="reader"></div>
  <div id="status">Initializing camera...</div>
  <button id="installBtn" class="install-btn">Install App</button>

  <script>
    // ✅ PWA install prompt
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-block';
    });

    installBtn.addEventListener('click', () => {
      installBtn.style.display = 'none';
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => deferredPrompt = null);
    });

    // ✅ Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // ✅ QR Scanning Logic
    window.addEventListener('load', () => {
      const reader = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then(cameras => {
        if (cameras && cameras.length) {
          const cameraId = cameras[0].id;
          reader.start(
            cameraId,
            { fps: 10, qrbox: 250 },
            qrCodeMessage => {
              document.getElementById('status').innerText = 
                "✅ QR Scanned! Saving file...";

              // Auto save text as .txt
              const blob = new Blob([qrCodeMessage], { type: "text/plain" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = "scanned_text.txt";
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);

              // Stop scanning after success
              reader.stop().then(() => {
                document.getElementById('status').innerText = 
                  "File saved successfully ✅";
              });
            },
            () => { document.getElementById('status').innerText = "Scanning..."; }
          );
        } else {
          document.getElementById('status').innerText = "No camera found.";
        }
      }).catch(err => {
        document.getElementById('status').innerText = "Camera error: " + err;
      });
    });
  </script>
</body>
</html>
